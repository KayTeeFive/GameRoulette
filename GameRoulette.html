<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Game Roulette</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --accent: #ff6b35;
    --accent2: #00d4ff;
    --gold: #ffd700;
    --text: #e0e0f0;
    --dim: #666688;
    --glow-orange: 0 0 20px rgba(255,107,53,0.5);
    --glow-blue: 0 0 20px rgba(0,212,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(255,107,53,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(0,212,255,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), var(--gold), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .main-layout {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1100px;
  }

  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .wheel-wrap {
    position: relative;
    width: 480px;
    height: 480px;
  }

  @media (max-width: 560px) {
    .wheel-wrap { width: 320px; height: 320px; }
  }

  .wheel-outer-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--gold), var(--accent), var(--accent2), var(--gold), var(--accent));
    animation: ringRotate 8s linear infinite;
    opacity: 0.7;
  }
  @keyframes ringRotate { to { transform: rotate(360deg); } }

  .wheel-outer-ring-mask {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: var(--bg);
  }

  canvas#wheel {
    position: relative;
    z-index: 2;
    border-radius: 50%;
    display: block;
    filter: drop-shadow(0 0 30px rgba(255,107,53,0.3));
    transition: filter 0.3s;
  }
  canvas#wheel.spinning {
    filter: drop-shadow(0 0 50px rgba(255,107,53,0.6)) drop-shadow(0 0 80px rgba(0,212,255,0.3));
  }

  .pointer {
    position: absolute;
    top: 50%;
    right: -28px;
    transform: translateY(-50%);
    z-index: 10;
  }
  .pointer svg {
    width: 56px;
    height: 56px;
    filter: drop-shadow(0 0 10px var(--accent));
  }

  .hub {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 54px;
    height: 54px;
    background: radial-gradient(circle, #fff 0%, var(--gold) 40%, var(--accent) 100%);
    border-radius: 50%;
    z-index: 10;
    box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,107,53,0.4);
    border: 3px solid rgba(255,255,255,0.8);
  }

  .result-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 28px;
    text-align: center;
    min-width: 300px;
    position: relative;
    overflow: hidden;
  }
  .result-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent2), transparent);
  }
  .result-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .result-text {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
    min-height: 2rem;
    transition: all 0.4s;
    word-break: break-word;
  }
  .result-text.winner { animation: winPulse 0.5s ease 3; }
  @keyframes winPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); text-shadow: 0 0 40px rgba(255,215,0,1); }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 300px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .field-group { margin-bottom: 18px; }
  .field-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .games-textarea {
    width: 100%;
    height: 180px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    padding: 10px 12px;
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    line-height: 1.5;
  }
  .games-textarea:focus { border-color: var(--accent2); box-shadow: var(--glow-blue); }

  .file-btn {
    width: 100%;
    padding: 9px;
    background: rgba(0,212,255,0.08);
    border: 1px dashed rgba(0,212,255,0.3);
    border-radius: 8px;
    color: var(--accent2);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    margin-top: 8px;
    display: block;
    text-align: center;
  }
  .file-btn:hover { background: rgba(0,212,255,0.15); border-color: var(--accent2); box-shadow: var(--glow-blue); }
  input[type="file"] { display: none; }

  .slider-row { display: flex; align-items: center; gap: 12px; }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(255,107,53,0.6);
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .slider-val {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 52px;
    text-align: right;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: background 0.2s;
  }
  .toggle-row:hover { background: rgba(255,255,255,0.05); }
  .toggle-switch {
    width: 42px; height: 22px;
    background: var(--border);
    border-radius: 11px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .toggle-row.active .toggle-switch { background: var(--accent); box-shadow: 0 0 10px rgba(255,107,53,0.5); }
  .toggle-row.active .toggle-switch::after { transform: translateX(20px); }
  .toggle-text { font-size: 0.92rem; font-weight: 600; letter-spacing: 0.05em; line-height: 1.3; }

  .spin-btn {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    background: linear-gradient(135deg, var(--accent), #ff8c00);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    position: relative;
    overflow: hidden;
  }
  .spin-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .spin-btn:hover:not(:disabled)::before { transform: translateX(100%); }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,53,0.6); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .progress-wrap {
    margin-top: 12px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .progress-wrap.visible { opacity: 1; }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 2px;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  .time-remaining {
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    color: var(--dim);
    margin-top: 6px;
    height: 1.2em;
  }

  .stop-btn {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: linear-gradient(135deg, #7f1d1d, #dc2626);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(220,38,38,0.3);
    display: none;
  }
  .stop-btn.visible { display: block; }
  .stop-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(220,38,38,0.55); }

  #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 50;
  }

  .footer {
    margin-top: 30px;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-align: center;
    z-index: 1;
  }
  .footer a { color: var(--accent2); text-decoration: none; transition: 0.2s; }
  .footer a:hover { color: var(--gold); text-shadow: 0 0 8px var(--accent2); }
</style>
</head>
<body>
<div class="scanlines"></div>
<canvas id="confettiCanvas"></canvas>

<h1>🎮 Game Roulette</h1>
<p class="subtitle">Spin the wheel — fate decides</p>

<div class="main-layout">
  <div class="wheel-section">
    <div class="wheel-wrap" id="wheelWrap">
      <div class="wheel-outer-ring"></div>
      <div class="wheel-outer-ring-mask"></div>
      <canvas id="wheel"></canvas>
      <div class="hub"></div>
      <div class="pointer" id="pointer">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="4,28 48,10 40,28 48,46" fill="#ff6b35" stroke="#ffd700" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="40" cy="28" r="5" fill="#ffd700" stroke="#ff6b35" stroke-width="1.5"/>
        </svg>
      </div>
    </div>

    <div class="result-box">
      <div class="result-label">Результат</div>
      <div class="result-text" id="resultText">— крутіть рулетку —</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">⚙ Налаштування</div>

    <div class="field-group">
      <label class="field-label">Список ігор (по одній на рядок)</label>
      <textarea class="games-textarea" id="gamesInput" placeholder="Minecraft&#10;Cyberpunk 2077&#10;The Witcher 3&#10;GTA V&#10;Hollow Knight&#10;Stardew Valley&#10;Dark Souls&#10;Portal 2"></textarea>
      <label class="file-btn" for="fileInput">📂 Завантажити .txt файл</label>
      <input type="file" id="fileInput" accept=".txt">
    </div>

    <div class="field-group">
      <label class="field-label">Час кручення</label>
      <div class="slider-row">
        <input type="range" id="timeSlider" min="1" max="10" value="3" step="1">
        <div class="slider-val"><span id="timeVal">3</span> хв</div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Поведінка стрілки</label>
      <div class="toggle-row" id="crazyToggle">
        <div class="toggle-switch"></div>
        <div class="toggle-text">🎲 Рандомна зміна напрямку</div>
      </div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="startSpin()">▶ КРУТИТИ!</button>
    <button class="stop-btn" id="stopBtn" onclick="stopSpin()">■ СТОП</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="time-remaining" id="timeRemaining"></div>
  </div>
</div>

<script>
// ── CRYPTO RANDOM ──────────────────────────────────────────────────────
function cryptoRand() {
  const b = new Uint32Array(1);
  crypto.getRandomValues(b);
  return b[0] / 0xFFFFFFFF;
}
function cryptoRandN(n) {
  const b = new Uint32Array(n);
  crypto.getRandomValues(b);
  return Array.from(b, v => v / 0xFFFFFFFF);
}

// ── STATE ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');

let games = [];
let spinning = false;
let currentAngle = 0;
let animFrameId = null;
let lastTs = null;

const COLORS = [
  ['#1a0533','#c026d3'],['#001a2e','#0284c7'],['#1a0e00','#ea580c'],
  ['#001a1a','#0d9488'],['#1a0000','#dc2626'],['#1a1a00','#ca8a04'],
  ['#0d001a','#7c3aed'],['#001a0d','#16a34a'],['#1a0010','#db2777'],
  ['#0a1a00','#65a30d'],['#001a1a','#0891b2'],['#1a0800','#d97706'],
];

// ── CANVAS RESIZE ──────────────────────────────────────────────────────
function resizeCanvas() {
  const size = document.getElementById('wheelWrap').offsetWidth;
  canvas.width = size;
  canvas.height = size;
  drawWheel();
}

// ── DRAW ───────────────────────────────────────────────────────────────
function drawWheel() {
  const size = canvas.width;
  const cx = size / 2, cy = size / 2, R = size / 2 - 4;
  ctx.clearRect(0, 0, size, size);

  if (!games.length) {
    ctx.fillStyle = '#1e1e2e';
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#666688';
    ctx.font = `bold ${size * 0.04}px Rajdhani`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Додайте ігри зліва →', cx, cy);
    return;
  }

  const n = games.length;
  const slice = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const startA = currentAngle + i * slice;
    const endA = startA + slice;
    const ci = i % COLORS.length;

    const grad = ctx.createRadialGradient(cx, cy, R * 0.15, cx, cy, R);
    grad.addColorStop(0, COLORS[ci][0]);
    grad.addColorStop(1, COLORS[ci][1]);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, startA, endA);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, R - 2, startA, endA);
    ctx.strokeStyle = COLORS[ci][1] + '55';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startA + slice / 2);
    ctx.translate(R * 0.62, 0);
    let label = games[i];
    const maxLen = Math.max(20, Math.floor(50 / n));
    if (label.length > maxLen) label = label.slice(0, maxLen - 1) + '…';
    const fontSize = Math.max(9, Math.min(16, (size * 0.032) * (8 / Math.max(n, 8))));
    ctx.font = `bold ${fontSize}px Rajdhani`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = COLORS[ci][1];
    ctx.shadowBlur = 8;
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.12, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0a0f';
  ctx.fill();
  ctx.strokeStyle = '#ffd70044';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ── PARSE ──────────────────────────────────────────────────────────────
function parseGames(text) {
  return text.split('\n').map(l => l.trim()).filter(l => l.length && !l.startsWith('#'));
}
function updateGames() {
  games = parseGames(document.getElementById('gamesInput').value);
  drawWheel();
}

// ── WINNER DETECTION ───────────────────────────────────────────────────
// Reads currentAngle directly — same logic as original, pointer is on the right.
function getWinner() {
  if (!games.length) return null;
  const n = games.length;
  const slice = (Math.PI * 2) / n;
  const norm = ((-currentAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  return games[Math.floor(norm / slice) % n];
}

// ── START SPIN ─────────────────────────────────────────────────────────
let maxSpeed = 0;
let spinDuration = 0;
let spinStart = null;
let spinDir = 1;
let crazyMode = false;
let lastDirChange = 0;
let dirChangeInterval = Infinity;
let currentSpeedMult = 1;
let targetSpeedMult = 1;
let lastSpeedChange = 0;
let pointerAngle = 0;
let pointerDir = 1;
let lastPointerFlip = 0;

function startSpin() {
  if (spinning || !games.length) return;
  if (games.length < 2) {
    document.getElementById('resultText').textContent = '⚠ Мінімум 2 гри!';
    return;
  }

  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('stopBtn').classList.add('visible');
  canvas.classList.add('spinning');
  document.getElementById('resultText').textContent = '🎲 Вибираємо…';

  // Crypto random speed in range 0.005–0.007 rad/ms
  maxSpeed = 0.005 + cryptoRand() * 0.002;
  spinDuration = parseInt(document.getElementById('timeSlider').value) * 60 * 1000;
  crazyMode = document.getElementById('crazyToggle').classList.contains('active');

  spinDir = crazyMode ? (cryptoRand() > 0.5 ? 1 : -1) : 1;
  lastDirChange = performance.now();
  dirChangeInterval = crazyMode ? (2000 + cryptoRand() * 4000) : Infinity;

  currentAngle = 0;
  currentSpeedMult = 1;
  targetSpeedMult = 1;
  lastSpeedChange = 0;
  pointerAngle = 0;
  pointerDir = 1;
  lastPointerFlip = 0;
  spinStart = null;
  lastTs = null;

  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('progressBar').style.width = '0%';

  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId = requestAnimationFrame(animLoop);
}

// ── ANIMATION LOOP ─────────────────────────────────────────────────────
function animLoop(ts) {
  if (!spinning) return;

  if (!spinStart) spinStart = ts;
  const elapsed = ts - spinStart;
  const t = Math.min(elapsed / spinDuration, 1);
  const accelTime = 10000;

  // Smooth speed variation during cruise (purely visual, no effect on winner)
  if (elapsed - lastSpeedChange > 250) {
    targetSpeedMult = 0.9 + cryptoRand() * 0.2;
    lastSpeedChange = elapsed;
  }
  currentSpeedMult += (targetSpeedMult - currentSpeedMult) * 0.06;

  let speedFactor;
  if (elapsed < accelTime) {
    speedFactor = elapsed / accelTime;
  } else if (t < 0.80) {
    speedFactor = currentSpeedMult;
  } else {
    // Ease-out: cubic, from currentSpeedMult → 0
    const p = (t - 0.80) / 0.20;
    speedFactor = currentSpeedMult * (1 - p * p * p);
  }

  const delta = lastTs ? Math.min(ts - lastTs, 100) : 0;
  lastTs = ts;

  currentAngle += maxSpeed * speedFactor * spinDir * delta;

  // Crazy mode: direction flips
  if (crazyMode && ts - lastDirChange > dirChangeInterval) {
    spinDir *= -1;
    lastDirChange = ts;
    dirChangeInterval = 1500 + cryptoRand() * 3500;
    pointerDir = spinDir;
  }

  // Pointer wobble (crazy mode only, purely cosmetic)
  if (crazyMode) {
    pointerAngle += 0.006 * pointerDir;
    if (Math.abs(pointerAngle) > 0.35 || ts - lastPointerFlip > 500) {
      pointerDir *= -1;
      lastPointerFlip = ts;
    }
  } else {
    pointerAngle *= 0.85;
  }
  document.getElementById('pointer').style.transform =
    `translateY(-50%) rotate(${(pointerAngle * 180 / Math.PI).toFixed(2)}deg)`;

  // Progress UI
  document.getElementById('progressBar').style.width = (t * 100).toFixed(1) + '%';
  const secLeft = Math.ceil((spinDuration - elapsed) / 1000);
  document.getElementById('timeRemaining').textContent = secLeft > 0 ? `⏱ ${secLeft}с залишилось` : '';

  drawWheel();

  if (t < 1) {
    animFrameId = requestAnimationFrame(animLoop);
  } else {
    finishSpin();
  }
}

// ── STOP (early) ───────────────────────────────────────────────────────
function stopSpin() {
  if (!spinning) return;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  document.getElementById('progressBar').style.width = '100%';
  finishSpin();
}

// ── FINISH ─────────────────────────────────────────────────────────────
function finishSpin() {
  spinning = false;
  canvas.classList.remove('spinning');
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('stopBtn').classList.remove('visible');
  document.getElementById('timeRemaining').textContent = '';
  document.getElementById('pointer').style.transform = 'translateY(-50%) rotate(0deg)';

  const winner = getWinner();
  const rt = document.getElementById('resultText');
  rt.textContent = winner ? `🏆 ${winner}` : '—';
  rt.classList.remove('winner');
  void rt.offsetWidth;
  rt.classList.add('winner');

  launchConfetti();

  const rotations = Math.abs(currentAngle) / (Math.PI * 2);
  console.log('Реальні оберти:', rotations.toFixed(2));
}

// ── CONFETTI ───────────────────────────────────────────────────────────
function launchConfetti() {
  const cc = document.getElementById('confettiCanvas');
  const cctx = cc.getContext('2d');
  cc.width = window.innerWidth;
  cc.height = window.innerHeight;
  const colors = ['#ff6b35','#ffd700','#00d4ff','#c026d3','#16a34a','#f43f5e'];
  const rng = cryptoRandN(120 * 6);
  let ri = 0;
  const particles = Array.from({length: 120}, () => ({
    x: rng[ri++] * cc.width, y: -20,
    vx: (rng[ri++] - 0.5) * 4, vy: 2 + rng[ri++] * 5,
    size: 6 + rng[ri++] * 8,
    color: colors[Math.floor(rng[ri++] * colors.length)],
    rot: rng[ri++] * 360, rotV: (cryptoRand()-0.5)*6,
    shape: cryptoRand() > 0.5 ? 'rect' : 'circle'
  }));
  let start = null;
  function frame(ts) {
    if (!start) start = ts;
    cctx.clearRect(0, 0, cc.width, cc.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vy += 0.08;
      if (p.y < cc.height + 20) alive = true;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot * Math.PI / 180);
      cctx.globalAlpha = Math.max(0, 1 - p.y / cc.height);
      cctx.fillStyle = p.color;
      if (p.shape === 'rect') cctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      else { cctx.beginPath(); cctx.arc(0,0,p.size/2,0,Math.PI*2); cctx.fill(); }
      cctx.restore();
    }
    if (alive && ts - start < 5000) requestAnimationFrame(frame);
    else cctx.clearRect(0,0,cc.width,cc.height);
  }
  requestAnimationFrame(frame);
}

// ── EVENTS ─────────────────────────────────────────────────────────────
document.getElementById('gamesInput').addEventListener('input', updateGames);
document.getElementById('timeSlider').addEventListener('input', function() {
  document.getElementById('timeVal').textContent = this.value;
});
document.getElementById('crazyToggle').addEventListener('click', function() {
  this.classList.toggle('active');
});
document.getElementById('fileInput').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('gamesInput').value = e.target.result; updateGames(); };
  reader.readAsText(file, 'UTF-8');
});
